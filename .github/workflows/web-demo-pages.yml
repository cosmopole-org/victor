# Build the Elpian↔Godot demo for the web (Godot 4.3 + GDExtension compiled to
# wasm via Emscripten, with the Elpian VM cross-compiled to
# wasm32-unknown-emscripten) and deploy it to GitHub Pages.
#
# Pipeline: Rust staticlib (emscripten) -> godot-cpp (platform=web,
# threads=no) -> the extension .wasm side module -> headless Godot web export
# (nothreads dlink templates, extensions_support=true) -> Pages. The
# non-threaded variant avoids the SharedArrayBuffer/COOP/COEP requirement
# GitHub Pages cannot meet, and matches Rust's prebuilt (atomics-free)
# emscripten std.
#
# Requires GitHub Pages to be enabled for the repo with "GitHub Actions" as
# the source (Settings -> Pages -> Build and deployment -> GitHub Actions).

name: Web demo (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "elpian/**"
      - ".github/workflows/web-demo-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_RELEASE: "4.3-stable"
  GODOT_TEMPLATE_DIR: "4.3.stable"
  # Godot 4.3 official web templates are built with this Emscripten; the
  # GDExtension side module must match.
  EMSDK_VERSION: "3.1.64"
  GODOT_CPP_BRANCH: "godot-4.3-stable"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache

      # Two toolchains, used for different targets:
      # * 1.81.0 for the emscripten target ONLY — current stable rustc emits
      #   wasm objects with LLVM target features (bulk-memory-opt,
      #   call-indirect-overlong) that emsdk 3.1.64's bundled wasm-opt does not
      #   understand, and the emsdk itself is pinned by Godot 4.3's official
      #   web templates. 1.81.0 is the emsdk-contemporary toolchain (verified
      #   locally with the exact emsdk 3.1.64 + 1.81.0 pairing).
      # * stable (the default) for the linux HOST library the headless editor
      #   loads during import/export — mirroring the Android workflow, whose
      #   stable-built host library loads cleanly.
      - name: Set up Rust 1.81.0 (wasm32-unknown-emscripten only)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.81.0"
          targets: wasm32-unknown-emscripten

      - name: Set up Rust stable (default, for the host build)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: elpian

      - name: Install SCons
        run: pip3 install scons

      - name: Clone godot-cpp
        run: |
          git clone --depth 1 -b "$GODOT_CPP_BRANCH" \
            https://github.com/godotengine/godot-cpp \
            elpian/godot/extension/godot-cpp

      - name: Cache godot-cpp web build
        uses: actions/cache@v4
        with:
          path: |
            elpian/godot/extension/godot-cpp/bin
            elpian/godot/extension/godot-cpp/gen
            elpian/godot/extension/godot-cpp/src
            elpian/godot/extension/.sconsign.dblite
          key: godot-cpp-web-${{ env.GODOT_CPP_BRANCH }}-${{ env.EMSDK_VERSION }}-v1

      # SIDE_MODULE=2: cargo also links the dependency crates' declared cdylib
      # targets (unused byproducts — only the staticlib matters), and on 1.81
      # emcc would otherwise link them as standalone executables and fail on a
      # missing main(). Linking them as side modules makes those byproducts
      # inert; the staticlib archive is unaffected.
      - name: Build Elpian VM C-ABI library (emscripten)
        working-directory: elpian
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: "-C link-arg=-sSIDE_MODULE=2"
        run: cargo +1.81.0 build -p elpian-godot-capi --release --target wasm32-unknown-emscripten

      # threads=no: Rust's prebuilt emscripten std lacks the atomics/bulk-memory
      # features, so it cannot link into a --shared-memory (threaded) module.
      # Godot 4.3 ships nothreads web templates for exactly this situation, and
      # they also drop the SharedArrayBuffer/COOP/COEP requirement — which
      # GitHub Pages cannot satisfy with headers anyway. The export preset sets
      # variant/thread_support=false to match.
      # generate_bindings=yes on BOTH scons calls: godot-cpp generates its
      # bindings (gen/) with builtin sizes for the FIRST build config only —
      # wasm32 is 32-bit, linux x86_64 is 64-bit — and scons does not
      # regenerate them on an arch switch. Without the flag the host .so gets
      # compiled against 32-bit Variant/String layouts and the 64-bit editor
      # aborts with "stack smashing detected" during import/export.
      - name: Build GDExtension (.wasm side module, nothreads)
        working-directory: elpian/godot/extension
        run: |
          scons platform=web threads=no target=template_release generate_bindings=yes \
            elpian_capi=../../target/wasm32-unknown-emscripten/release/libelpian_godot.a
          ls -la ../project/bin/

      # The headless editor loads the .gdextension during import/export, so the
      # host (linux) library must exist too. SConstruct cargo-builds the native
      # archive automatically when it is missing.
      - name: Build GDExtension for the host platform
        working-directory: elpian/godot/extension
        run: scons platform=linux target=template_release generate_bindings=yes

      - name: Install Godot editor + export templates
        run: |
          curl -sSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          curl -sSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}"
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}/"

      # Export the Victor FLUTTER × Godot-3D demo (portrait). The web export
      # cannot embed a Flutter engine (libflutter does not build into a wasm
      # Godot export), so `FL.mount` returns null and the demo runs its VUI
      # fallback HUD over the live 3D scene — fully interactive. Swap the scene
      # for res://ui_demo.tscn / res://react_3d_demo.tscn to ship a different one.
      - name: Point the export at the Victor Flutter × Godot-3D demo
        run: |
          sed -i \
            -e 's|^run/main_scene=.*|run/main_scene="res://flutter_3d_demo.tscn"|' \
            -e 's|^window/size/viewport_width=.*|window/size/viewport_width=720|' \
            -e 's|^window/size/viewport_height=.*|window/size/viewport_height=1280|' \
            -e 's|^window/handheld/orientation=.*|window/handheld/orientation=1|' \
            elpian/godot/project/project.godot
          grep -E "run/main_scene|viewport_|orientation" elpian/godot/project/project.godot

      - name: Import project
        run: godot --headless --path elpian/godot/project --import || true

      - name: Export web build
        run: |
          mkdir -p elpian/godot/build/web
          godot --headless --verbose --path elpian/godot/project --export-release "Web" \
            "$GITHUB_WORKSPACE/elpian/godot/build/web/index.html"
          ls -la elpian/godot/build/web

      # Godot's official web templates are built without exception catching,
      # but Rust's prebuilt emscripten std unwinds panics emscripten-style, so
      # the side module imports invoke_* thunks the template's JS glue never
      # defines — the extension's first call aborts with "undefined symbol
      # 'invoke_viii'". Teach the exported glue to synthesize them (see the
      # script header for the full story).
      - name: Patch exported JS glue for the Rust side module
        run: node elpian/godot/patch-web-export.mjs elpian/godot/build/web/index.js

      # No COOP/COEP shim needed: the nothreads build never touches
      # SharedArrayBuffer, so plain GitHub Pages hosting is sufficient.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: elpian/godot/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
