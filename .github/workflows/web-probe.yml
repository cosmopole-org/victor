# Diagnostic for the "stack smashing detected" crash in the web pipeline's
# import/export steps. One dispatch, five probes, each isolating a variable:
#
#   P0/P1  linux-only host build            -> --quit / --import   (baseline)
#   P2     + dummy .wasm at the gdextension web path -> both       (file presence)
#   P3     + emsdk on PATH (no wasm)        -> --import            (environment)
#   P4     + REAL web side module built     -> both                (real wasm)
#   P5     + linux host REBUILT after web   -> both                (build order)
#
# Every probe reports "PROBE <n> exit=<code>" so the verdict is greppable.

name: Web pipeline probe

on:
  workflow_dispatch:
  push:
    branches: [claude/android-apk-github-workflow-dpy09r]
    paths:
      - ".github/workflows/web-probe.yml"

permissions:
  contents: read

env:
  GODOT_RELEASE: "4.3-stable"
  GODOT_TEMPLATE_DIR: "4.3.stable"
  EMSDK_VERSION: "3.1.64"
  GODOT_CPP_BRANCH: "godot-4.3-stable"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install SCons
        run: pip3 install scons

      - name: Clone godot-cpp
        run: |
          git clone --depth 1 -b "$GODOT_CPP_BRANCH" \
            https://github.com/godotengine/godot-cpp \
            victor/bridge/extension/godot-cpp

      - name: Build linux host library (linux-only, clean tree)
        working-directory: victor/bridge/extension
        run: scons platform=linux target=template_release

      - name: Install Godot editor + export templates
        run: |
          curl -sSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          curl -sSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}"
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}/"

      - name: "P0: quit-only, linux host lib only"
        run: |
          set +e
          timeout 120 godot --headless --path victor/bridge/project --quit > p0.log 2>&1
          echo "PROBE P0 exit=$?"
          tail -8 p0.log

      - name: "P1: import, linux host lib only"
        run: |
          set +e
          rm -rf victor/bridge/project/.godot
          timeout 300 godot --headless --verbose --path victor/bridge/project --import > p1.log 2>&1
          echo "PROBE P1 exit=$?"
          grep -E "stack smashing|Aborted" p1.log; tail -6 p1.log

      - name: "P2: import + export with DUMMY wasm present"
        run: |
          set +e
          printf 'dummy' > victor/bridge/project/bin/libelpian_godot.web.wasm32.wasm
          rm -rf victor/bridge/project/.godot
          timeout 300 godot --headless --verbose --path victor/bridge/project --import > p2a.log 2>&1
          echo "PROBE P2a(import) exit=$?"
          grep -E "stack smashing" p2a.log; tail -4 p2a.log
          mkdir -p victor/bridge/build/web
          timeout 300 godot --headless --verbose --path victor/bridge/project --export-release "Web" \
            "$GITHUB_WORKSPACE/victor/bridge/build/web/index.html" > p2b.log 2>&1
          echo "PROBE P2b(export) exit=$?"
          grep -E "stack smashing" p2b.log; tail -6 p2b.log
          rm -f victor/bridge/project/bin/libelpian_godot.web.wasm32.wasm

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}

      - name: "P3: import with emsdk env, NO wasm"
        run: |
          set +e
          rm -rf victor/bridge/project/.godot
          timeout 300 godot --headless --verbose --path victor/bridge/project --import > p3.log 2>&1
          echo "PROBE P3 exit=$?"
          grep -E "stack smashing" p3.log; tail -4 p3.log

      - name: Set up Rust 1.81.0 (wasm32-unknown-emscripten)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.81.0"
          targets: wasm32-unknown-emscripten

      - name: Build the REAL web side module
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: "-C link-arg=-sSIDE_MODULE=2"
        run: |
          cd victor
          cargo +1.81.0 build -p elpian-godot-capi --release --target wasm32-unknown-emscripten
          cd bridge/extension
          scons platform=web threads=no target=template_release \
            elpian_capi=../../target/wasm32-unknown-emscripten/release/libelpian_godot.a
          ls -la ../project/bin/

      - name: "P4: import + export with REAL wasm (host lib from linux-only build)"
        run: |
          set +e
          rm -rf victor/bridge/project/.godot
          timeout 300 godot --headless --verbose --path victor/bridge/project --import > p4a.log 2>&1
          echo "PROBE P4a(import) exit=$?"
          grep -E "stack smashing" p4a.log; tail -4 p4a.log
          mkdir -p victor/bridge/build/web
          timeout 600 godot --headless --verbose --path victor/bridge/project --export-release "Web" \
            "$GITHUB_WORKSPACE/victor/bridge/build/web/index.html" > p4b.log 2>&1
          echo "PROBE P4b(export) exit=$?"
          grep -E "stack smashing" p4b.log; tail -8 p4b.log
          ls -la victor/bridge/build/web || true

      - name: "P5: rebuild linux host AFTER web, then import + export"
        run: |
          set +e
          cd victor/bridge/extension
          scons platform=linux target=template_release > /dev/null 2>&1
          echo "host rebuild exit=$?"
          cd "$GITHUB_WORKSPACE"
          rm -rf victor/bridge/project/.godot
          timeout 300 godot --headless --verbose --path victor/bridge/project --import > p5a.log 2>&1
          echo "PROBE P5a(import) exit=$?"
          grep -E "stack smashing" p5a.log; tail -4 p5a.log
          timeout 600 godot --headless --verbose --path victor/bridge/project --export-release "Web" \
            "$GITHUB_WORKSPACE/victor/bridge/build/web/index.html" > p5b.log 2>&1
          echo "PROBE P5b(export) exit=$?"
          grep -E "stack smashing" p5b.log; tail -6 p5b.log

      - name: Upload probe logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-logs
          path: "p*.log"
